services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-file_store_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-file_store_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-admin123456}
    volumes:
      - minio_data:/data
    ports:
      # Publicados en el mismo puerto que usa internamente el contenedor:
      # es necesario porque las presigned URLs las abre el NAVEGADOR,
      # no el backend. Ver nota sobre /etc/hosts más abajo.
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend/storage-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-file_store_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin123}

      JWT_SECRET: ${JWT_SECRET:?Debes definir JWT_SECRET en tu .env}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}

      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}

      # OJO: "minio" tiene que resolver tanto desde este contenedor (lo hace
      # solo, vía DNS interno de Docker) como desde el navegador del host
      # (necesita una entrada en /etc/hosts). Ver README-docker.md.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-files}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-admin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-admin123456}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Frontend/storage-webapp
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  minio_data: