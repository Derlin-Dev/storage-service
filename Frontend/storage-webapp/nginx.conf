server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mismo comportamiento que el proxy de Vite en dev: todo lo que
    # empieza con /file-store se manda al backend. Al ser mismo origen
    # desde el punto de vista del navegador, no hace falta tocar CORS.
    location /file-store/ {
        proxy_pass http://backend:8080/file-store/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router: cualquier ruta que no sea un archivo real cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}