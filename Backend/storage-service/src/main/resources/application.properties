spring.application.name=storage-service

# URLs publicas (usadas para armar links de descarga/compartir)
# En docker-compose se sobreescriben con APP_BASE_URL / APP_FRONTEND_URL.
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# JWT 
# IMPORTANTE: no dejar un secreto real hardcodeado en el repo. En dev local
# sin Docker, exporta JWT_SECRET en tu shell o usa un application-local.properties
# (ignorado por git). En docker-compose se toma de .env -> JWT_SECRET.
jwt.secret=${JWT_SECRET:dev-only-secret-cambiame-nunca-uses-esto-en-produccion}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Base de datos 
# Los valores por defecto (localhost:5432) son para correr el backend
# directo con ./mvnw sin Docker, contra un Postgres local. En docker-compose
# se sobreescriben con SPRING_DATASOURCE_* apuntando al servicio "postgres".
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/file_store_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Almacenamiento S3 / MinIO
# Igual que arriba: localhost:9000 es para dev local sin Docker. En
# docker-compose se sobreescribe con STORAGE_ENDPOINT=http://minio:9000
# (y requiere el alias "minio" en /etc/hosts para que el navegador también
# pueda resolverlo - ver README-docker.md).
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.region=${STORAGE_REGION:us-east-1}
storage.bucket=${STORAGE_BUCKET:files}
storage.access-key=${STORAGE_ACCESS_KEY:admin}
storage.secret-key=${STORAGE_SECRET_KEY:admin123456}